<h1>헬스</h1>
<p>고등학교때 건강도 챙기고 몸을 만들어보고자 헬스를 시작하게 되었습니다.</p>
<p>3분할로 진행하며, Push day: 가슴,어깨,삼두 Pull day: 등,이두,후면어깨 Leg day로 진행합니다. 요새는 술 많이 마셔서 헬스장 많이 못갑니다. </p>
<p>헬스의 장점: 멋진 몸과 규칙적인 삶을 어필하여 이성에게 호감을 줄 수 있습니다.
<p>헬스의 단점: 어필할 이성은 없고 남자랑만 헬스장 가게 될 뿐입니다..</p>
